<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Permata Kasirku</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --ink:#1E1F22; --gray:#9B9EA6; --gray2:#6E7178; --soft:#F1F1F4; --bg:#F5F5F7;
  --blue:#2F6BFF; --gold:#F5B301; --green:#0E9F6E; --red:#E24C4C; --line:#E8E8EC;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif}
body{background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;font-family:inherit;background:none}
input,select,textarea{font-family:inherit;font-size:.95rem;padding:.7rem .9rem;border:1.5px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ink)}
label{font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray);display:block;margin:.75rem 0 .3rem}
h1,h2,h3{font-weight:800;letter-spacing:-.02em}
.hidden{display:none!important}
.pill{background:var(--ink);color:#fff;font-weight:700;padding:.85rem 1.4rem;border-radius:999px;font-size:.95rem;display:inline-flex;align-items:center;justify-content:center;gap:.45rem;transition:transform .12s,opacity .12s}
.pill:active{transform:scale(.97)}
.pill.out{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.pill.blue{background:var(--blue)} .pill.green{background:var(--green)} .pill.red{background:var(--red)}
.pill.sm{padding:.5rem .95rem;font-size:.82rem}
.card{background:#fff;border-radius:20px;padding:1.1rem;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);text-align:left;padding:.55rem .55rem;border-bottom:1.5px solid var(--line)}
td{padding:.6rem .55rem;border-bottom:1px solid var(--soft);vertical-align:middle}
.badge{font-size:.7rem;font-weight:700;padding:.22rem .6rem;border-radius:999px;display:inline-block}
.b-blue{background:#EAF0FF;color:var(--blue)} .b-red{background:#FDECEC;color:var(--red)}
.b-green{background:#E6F7F0;color:var(--green)} .b-gold{background:#FFF6DE;color:#8a6d10}
.scroll{overflow:auto}
.empty{text-align:center;color:var(--gray);padding:2.2rem 1rem;font-size:.9rem}
svg{display:block}
#pageHost{animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pcard{transition:transform .15s ease;box-shadow:0 3px 8px rgba(20,20,30,.10)}
.pcard:active{transform:scale(.96)}
.listRow{transition:background .15s,border-color .15s}
.listRow:hover{border-color:#D5D6DE;background:#FBFBFD}
.tab{transition:background .15s,color .15s}
.card,.statCard{box-shadow:0 1px 3px rgba(20,20,30,.05)}
.pill:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.modal{animation:sheetUp .25s ease}
@keyframes sheetUp{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}

/* ===== WELCOME / LOGIN (replika referensi) ===== */
#loginView{min-height:100vh;background:#E9E9EC;display:flex;align-items:center;justify-content:center;padding:0}
.phone{width:100%;max-width:430px;min-height:100vh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}
@media(min-width:520px){#loginView{padding:2rem}.phone{min-height:820px;border-radius:44px;box-shadow:0 30px 80px rgba(0,0,0,.18)}}
.hero{position:relative;height:56%;min-height:430px;flex:none}
.hero img{width:100%;height:100%;object-fit:cover;animation:heroMove 20s ease-in-out infinite alternate;will-change:transform}
@media(max-width:380px),(max-height:700px){.hero img{animation:none}}
@keyframes heroMove{0%{transform:scale(1.03)}50%{transform:scale(1.08) translate(-1.2%,.8%)}100%{transform:scale(1.05) translate(1%,-.7%)}}
.heroLogo{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);text-align:center;color:#fff}
.logoCircle{width:86px;height:86px;border-radius:50%;background:#fff;margin:0 auto 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 6px 24px rgba(0,0,0,.25)}
.logoCircle b{font-size:1.5rem;color:#C9A227}
.logoCircle span{font-size:.42rem;font-weight:800;letter-spacing:.12em;margin-top:1px}
.heroLogo h2{font-size:1.6rem;letter-spacing:.02em;text-shadow:0 2px 14px rgba(0,0,0,.45)}
.heroLogo p{font-size:.8rem;font-weight:600;text-shadow:0 1px 10px rgba(0,0,0,.5)}
.welcomeSheet{background:#fff;flex:1;margin-top:-52px;border-radius:50% 50% 0 0/56px 56px 0 0;position:relative;z-index:2;padding:2.6rem 2rem 2rem;text-align:center;display:flex;flex-direction:column}
.welcomeSheet h1{font-size:2.3rem;letter-spacing:.04em;color:#4A4B4F}
.welcomeSheet .tag{color:var(--gray2);font-size:.98rem;margin:.7rem 0 1.6rem;line-height:1.5}
.welcomeSheet .pill{width:100%;max-width:300px;margin:0 auto .8rem;padding:1rem}
.pwWrap{position:relative}
.pwWrap button{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);font-size:1.05rem;color:var(--gray)}
.formBox{text-align:left;max-width:320px;margin:0 auto;width:100%}
.err{color:var(--red);font-size:.82rem;font-weight:700;margin-top:.6rem;text-align:center}

/* ===== MAIN APP (kolom phone, persis referensi) ===== */
body.inApp{background:#E9E9EC}
#mainView{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;padding:1.15rem 1.05rem 8.5rem}
@media(min-width:520px){
  body.inApp{padding:2rem 0 0}
  #mainView{min-height:calc(100vh - 2rem);border-radius:44px 44px 0 0;box-shadow:0 30px 80px rgba(0,0,0,.18)}
}
.appHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.locChip{display:flex;align-items:center;gap:.5rem}
.locIcon{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;background:#fff}
.locName{background:var(--ink);color:#fff;font-size:.78rem;font-weight:700;padding:.4rem .85rem;border-radius:999px}
.headR{display:flex;gap:.6rem;align-items:center}
.bell{width:42px;height:42px;border-radius:50%;background:#fff;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;position:relative}
.bell i{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--blue);border:1.5px solid #fff}
.ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#DDE3F0,#C9D4EC);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--ink);font-size:1rem}
.bigTitle{font-size:1.75rem;line-height:1.15;margin:.2rem 0 1rem}
.searchRow{display:flex;align-items:center;background:var(--soft);border-radius:999px;padding:.35rem .5rem .35rem 1rem;gap:.6rem;margin-bottom:1rem}
.searchRow input{border:none;background:none;padding:.5rem 0;border-radius:0;font-size:.95rem}
.tuneBtn{width:40px;height:40px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tabs{display:flex;gap:.5rem;overflow:auto;padding-bottom:.35rem;margin-bottom:1rem;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;background:var(--soft);color:var(--gray2);font-weight:700;font-size:.85rem;padding:.55rem 1.15rem;border-radius:999px;white-space:nowrap}
.tab.on{background:var(--ink);color:#fff}
.secTitle{font-weight:800;font-size:1.05rem;margin:.3rem 0 .8rem}
.statScroll{display:flex;gap:.7rem;overflow:auto;margin-bottom:1.1rem;scrollbar-width:none}
.statScroll::-webkit-scrollbar{display:none}
.statCard{flex:none;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:.85rem 1rem}
.statCard span{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;font-weight:800;color:var(--gray)}
.statCard b{display:block;font-size:1.05rem;margin-top:.15rem}

/* product cards — replika kartu referensi */
.backBtn{display:inline-flex;align-items:center;gap:.2rem;background:#fff;border:1px solid var(--line);border-radius:999px;padding:.42rem .95rem;font-weight:800;font-size:.82rem;margin-bottom:.7rem;color:var(--ink)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem}
.pcard{content-visibility:auto;contain-intrinsic-size:0 210px}
.listRow{content-visibility:auto;contain-intrinsic-size:0 68px}
.pcard{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:.86;cursor:pointer;background:#ddd}
.pcard>img{width:100%;height:100%;object-fit:cover;display:block}
.chk.del{background:var(--red)}
.noBeli{position:absolute;right:12px;top:46px;width:14px;height:14px;border-radius:50%;background:var(--red);border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35);z-index:2}
.qtyB{position:absolute;top:11px;left:44px;background:var(--blue);color:#fff;font-size:.72rem;font-weight:800;padding:.22rem .55rem;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:2}
.chk{position:absolute;top:10px;left:10px;width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.priceTag{position:absolute;top:10px;right:10px;background:rgba(24,24,28,.8);color:#fff;font-size:.72rem;font-weight:700;padding:.32rem .65rem;border-radius:999px}
.pgrad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.72) 100%)}
.pinfo{position:absolute;left:12px;right:12px;bottom:10px;color:#fff}
.rate{display:inline-flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.42);font-size:.7rem;font-weight:800;padding:.24rem .6rem;border-radius:999px;margin-bottom:.35rem}
.pname{font-weight:800;font-size:.92rem;line-height:1.2;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
.ploc{display:flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:600;opacity:.9;margin-top:.15rem}

/* bottom nav — replika bar referensi */
.botNav{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;width:min(430px,94%);background:#fff;border-radius:999px;box-shadow:0 10px 40px rgba(0,0,0,.14);display:flex;justify-content:space-around;padding:.55rem .4rem;z-index:40}
.botNav button{display:flex;flex-direction:column;align-items:center;gap:2px;color:#A2A5AD;font-size:.6rem;font-weight:700;padding:.2rem .55rem;min-width:56px}
.botNav button.on{color:var(--blue)}
.botNav svg{width:22px;height:22px}

/* POS cart bar */
.cartBar{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;width:min(430px,94%);background:var(--ink);color:#fff;border-radius:999px;padding:.8rem 1.3rem;display:flex;justify-content:space-between;align-items:center;font-weight:800;z-index:39;box-shadow:0 10px 30px rgba(0,0,0,.25);cursor:pointer}

/* modal / sheet */
.overlay{position:fixed;inset:0;background:rgba(20,20,24,.55);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.modal{background:#fff;border-radius:26px 26px 0 0;padding:1.4rem 1.3rem calc(1.4rem + env(safe-area-inset-bottom));width:100%;max-width:520px;max-height:92vh;overflow:auto}
.modal h2{font-size:1.15rem;margin-bottom:.3rem}
.grab{width:44px;height:5px;border-radius:99px;background:var(--line);margin:0 auto .9rem}
@media(min-width:640px){.overlay{align-items:center;padding:1rem}.modal{border-radius:26px}.grab{display:none}}
.mFoot{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.15rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 .8rem}
.imgUp{width:92px;height:92px;border-radius:16px;border:1.8px dashed var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--soft);font-size:1.4rem;color:var(--gray)}
.imgUp img{width:100%;height:100%;object-fit:cover}
.cartItem{display:flex;gap:.6rem;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--soft);font-size:.9rem}
.qtyBtn{width:28px;height:28px;border-radius:9px;background:var(--soft);font-weight:800;font-size:1rem}
.totalRow{display:flex;justify-content:space-between;font-size:.92rem;padding:.28rem 0}
.totalRow.big{font-size:1.2rem;font-weight:800}
.thumb{width:46px;height:46px;border-radius:12px;object-fit:cover;background:var(--soft);flex:none;display:flex;align-items:center;justify-content:center;color:var(--gray)}
.listRow{display:flex;gap:.7rem;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:.65rem .75rem;margin-bottom:.55rem}
.toast .undoBtn{margin-left:.7rem;background:#fff;color:var(--ink);border-radius:999px;padding:.28rem .75rem;font-weight:800;font-size:.76rem}
.toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:.7rem 1.2rem;border-radius:999px;font-weight:700;font-size:.86rem;z-index:99;box-shadow:0 8px 30px rgba(0,0,0,.3);white-space:nowrap}
#video{width:100%;border-radius:16px;overflow:hidden;background:#000;min-height:250px;position:relative}
#video video,#video canvas{width:100%!important;height:auto!important}

/* struk */
#struk{width:300px;background:#fff;padding:14px;color:#000;font-family:'Courier New',monospace;font-size:12px;margin:0 auto;border:1px dashed var(--line)}
#struk .sh{text-align:center;margin-bottom:8px}
#struk .sh b{font-size:14px;letter-spacing:.05em}
#struk hr{border:none;border-top:1px dashed #000;margin:6px 0}
#struk .li{display:flex;justify-content:space-between}
.gemS{display:inline-flex;width:26px;height:26px;border-radius:50%;background:#1E1F22;color:#C9A227;align-items:center;justify-content:center;font-size:15px;margin-bottom:4px}
@media print{
  body *{visibility:hidden}
  #printZone,#printZone *{visibility:visible}
  #printZone{position:absolute;left:0;top:0;width:100%}
  #struk{border:none}
}
.filterRow{display:flex;gap:.5rem;align-items:end;flex-wrap:wrap;margin-bottom:1rem}
.filterRow>div{min-width:135px;flex:1}
</style>
</head>

function b64ToUrl(dataUri){
  try{
    const[meta,b64]=dataUri.split(',');
    const mime=(meta.match(/data:([^;]+)/)||[])[1]||'image/jpeg';
    const bin=atob(b64);const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([arr],{type:mime}));
  }catch(e){return dataUri;}
}

async function doSignup(){
  const btn=$('btnSignup');
  const nama=$('sNama').value.trim(),un=$('sUser').value.trim(),pw=$('sPass').value;
  const mode=window._sMode||'new';
  const e=$('sErr');e.classList.add('hidden');
  if(!nama||!un||!pw){e.textContent='Semua kolom wajib diisi.';e.classList.remove('hidden');return;}
  if(pw.length<6){e.textContent='Password minimal 6 karakter.';e.classList.remove('hidden');return;}
  if(mode==='new'&&!$('sToko').value.trim()){e.textContent='Nama toko wajib diisi.';e.classList.remove('hidden');return;}
  if(mode==='join'&&!$('sKode').value.trim()){e.textContent='Kode toko wajib diisi.';e.classList.remove('hidden');return;}
  busyOn(btn,'Mendaftarkan...');
  try{
    const {data,error}=await sb.auth.signUp({email:emailFor(un),password:pw});
    if(error)throw error;
    if(!data.session){
      const r2=await sb.auth.signInWithPassword({email:emailFor(un),password:pw});
      if(r2.error)throw r2.error;
    }
    if(mode==='new'){
      const {error:e2}=await sb.rpc('daftar_toko_baru',{nama_toko:$('sToko').value.trim(),nama_admin:nama});

  }
}
function friendlyErr(err){
  const m=(err&&err.message)||'';
  if(m.includes('already registered')||m.includes('already been registered'))return'Username sudah dipakai.';
  if(m.includes('Invalid login'))return'Username atau password salah.';
  if(m.includes('Kode Toko'))return m;
  if(m.includes('sudah terdaftar'))return m;
  return m||'Terjadi kesalahan. Coba lagi.';
}

/* ============ REKOMENDASI SAFETY STOCK ============ */
function calcRec(L){
  const cut=new Date(Date.now()-30*864e5).toISOString().slice(0,10);
  const daily={};
  S.sales.filter(s=>s.tgl>=cut).forEach(s=>s.items.forEach(i=>{
    if(!i.pid)return;
    daily[i.pid]=daily[i.pid]||{};
    daily[i.pid][s.tgl]=(daily[i.pid][s.tgl]||0)+i.qty;
  }));
  const rec=[];
  for(const pid in daily){
    const p=S.products.find(x=>x.id===pid);if(!p)continue;
    const qs=Object.values(daily[pid]);
    const tot=qs.reduce((a,b)=>a+b,0);
    const d=tot/30;
    const mean=tot/30;
    let varsum=0;
    for(let i=0;i<30;i++){const q=qs[i]||0;varsum+=(q-mean)**2;}
    const sd=Math.sqrt(varsum/30);
    const ss=Math.ceil(1.65*sd*Math.sqrt(L));
    const rop=Math.ceil(d*L+ss);
    rec.push({p,d:d.toFixed(2),ss,rop,perlu:p.stok<=rop});
  }
  rec.sort((a,b)=>(b.perlu-a.perlu)||(b.rop-a.rop));
  return rec;
}
function analisa(){
  const now=Date.now(),hari=864e5;
  const t30=new Date(now-30*hari).toISOString().slice(0,10);
  const t90=new Date(now-90*hari).toISOString().slice(0,10);
  const s30={},s90={},last={},hargaJualMin={};
  let tglAwal=today();
  S.sales.forEach(s=>{
    if(s.tgl<tglAwal)tglAwal=s.tgl;
    s.items.forEach(i=>{
      if(!i.pid)return;
      if(s.tgl>=t30)s30[i.pid]=(s30[i.pid]||0)+i.qty;
      if(s.tgl>=t90)s90[i.pid]=(s90[i.pid]||0)+i.qty;
      if(!last[i.pid]||s.tgl>last[i.pid])last[i.pid]=s.tgl;
      if(hargaJualMin[i.pid]===undefined||i.harga<hargaJualMin[i.pid])hargaJualMin[i.pid]=i.harga;
    });
  });
  const dataHari=Math.min(90,Math.round((now-new Date(tglAwal).getTime())/hari)||0);
  const L=window._lead||3;
  const pesan=[],stop=[],diskon=[],rugi=[];
  S.products.forEach(p=>{
    const q30=s30[p.id]||0,q90=s90[p.id]||0;
    // RUGI: harga jual master di bawah harga beli, atau pernah laku di bawah beli
    if(p.beli>0&&(p.jual<=p.beli||(hargaJualMin[p.id]!==undefined&&hargaJualMin[p.id]<p.beli)))
      rugi.push({p,q90});
    // PESAN: laris 30 hari, target = kebutuhan (lead time + 30 hari) + SS, kurang dari stok
    if(q30>0){
      const d=q30/30;
      const ss=Math.ceil(1.65*Math.sqrt(d)*Math.sqrt(L));
      const target=Math.ceil(d*(L+30))+ss;
      const butuh=target-p.stok;
      if(butuh>0)pesan.push({p,q30,butuh});
    }
    // STOP: ada stok tapi tidak berputar 90 hari
    if(p.stok>0&&q90===0)stop.push({p,last:last[p.id]||'-'});
    // DISKON: masih laku tapi lambat, stok jauh melebihi laju 90 hari
    else if(p.stok>0&&q90>0&&p.stok>=q90*3)diskon.push({p,q90});
  });
  pesan.sort((a,b)=>b.butuh-a.butuh);
  stop.sort((a,b)=>b.p.stok*b.p.beli-a.p.stok*a.p.beli);
  diskon.sort((a,b)=>b.p.stok-a.p.stok);
  // klasifikasi perputaran + safety stock: sering >=10/bln, sedang 3-9, jarang 1-2
  const sering=[],sedang=[],jarang=[];
  S.products.forEach(p=>{
    const q30=s30[p.id]||0;
    if(q30<=0)return;
    const d=q30/30;
    const ss=Math.max(1,Math.ceil(1.65*Math.sqrt(d)*Math.sqrt(L)));
    const item={p,q30,ss};
    if(q30>=10)sering.push(item);else if(q30>=3)sedang.push(item);else jarang.push(item);
  });
  [sering,sedang,jarang].forEach(arr=>arr.sort((a,b)=>b.q30-a.q30));
  return{pesan,stop,diskon,rugi,dataHari,L,sering,sedang,jarang};
}

  const sku=$('fSku').value.trim()||('SKU'+Date.now().toString().slice(-6));

    if(id){
      const lama={...S.products.find(x=>x.id===id)};
      const{error}=await sb.from('products').update({nama:o.nama,sku:o.sku,barcode:o.barcode,kategori:o.kategori,
        beli:o.beli,jual:o.jual,stok:o.stok,min_stok:o.min,img:o.img}).eq('id',id);

      Object.assign(S.products.find(x=>x.id===id),o);

var LOGO_IMG=null;
function setLogo(dataUrl){

  else LOGO_IMG=null;

function pilihLogo(){$('logoFile').click();}
async function prosesLogo(inp){
  const f=inp.files&&inp.files[0];if(!f)return;
  inp.value='';
  const nama=(f.name||'').toLowerCase();
  try{
    let dataUrl;
    if(nama.endsWith('.pdf')){
      if(!window.pdfjsLib){toast('Pembaca PDF belum termuat, coba lagi atau pakai PNG/JPG');return;}
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const buf=await f.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const page=await pdf.getPage(1);
      const vp=page.getViewport({scale:2});
      const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;
      await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      dataUrl=c.toDataURL('image/png');
    }else{
      dataUrl=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.onerror=()=>rej(new Error('gagal baca file'));
        r.readAsDataURL(f);
      });
    }
    // kecilkan ke maksimal 320px supaya ringan di database & tajam di struk
    const img=new Image();
    await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=dataUrl;});
    const max=320,sk=Math.min(1,max/Math.max(img.naturalWidth||1,img.naturalHeight||1));
    const c2=document.createElement('canvas');
    c2.width=Math.round((img.naturalWidth||max)*sk);c2.height=Math.round((img.naturalHeight||max)*sk);
    const g2=c2.getContext('2d');
    g2.fillStyle='#fff';g2.fillRect(0,0,c2.width,c2.height);
    g2.drawImage(img,0,0,c2.width,c2.height);
    await simpanLogo(c2.toDataURL('image/jpeg',.85));
  }catch(e){toast('Gagal memproses logo: '+((e&&e.message)||'format tidak didukung'));}
}
async function simpanLogo(dataUrl){
  try{
    const{error}=await sb.from('toko').update({logo:dataUrl}).eq('id',CU.toko_id);
    if(error)throw error;
    setLogo(dataUrl);rSet();toast('Logo tersimpan, langsung tampil di struk');
  }catch(e){
    const m=(e&&e.message)||'';
    if(m.includes('logo')&&(m.includes('column')||m.includes('schema')))
      toast('Kolom logo belum ada. Jalankan SQL: alter table toko add column logo text;');
    else toast(sbErr(e,'Gagal menyimpan logo'));
  }
}
function hapusLogo(){askConfirm('Hapus logo toko?',async()=>{
  try{
    const{error}=await sb.from('toko').update({logo:null}).eq('id',CU.toko_id);
    if(error)throw error;

});}

  rProd($('pQ')?$('pQ').value:'');
}
function pilihSemua(){
  (window._lastProdIds||[]).forEach(id=>window._selIds.add(id));
  rProd($('pQ')?$('pQ').value:'');
}
function chunk(arr,n){const out=[];for(let i=0;i<arr.length;i+=n)out.push(arr.slice(i,i+n));return out;}
function delSelected(){
  const ids=[...window._selIds];
  if(!ids.length){toast('Belum ada produk dipilih');return;}
  const semua=ids.length===S.products.length;
  askConfirm(`Hapus ${ids.length} produk${semua?' (SEMUA PRODUK)':''}? Masih bisa diurungkan setelahnya.`,async()=>{
    const idset=new Set(ids);
    const snap=S.products.filter(p=>idset.has(p.id)).map(p=>({...p}));
    try{
      toast('Menghapus '+ids.length+' produk...');
      if(semua){
        const{error}=await sb.from('products').delete().eq('toko_id',CU.toko_id);
        if(error)throw error;
      }else{
        await delChunk('products',ids);
      }
      S.products=S.products.filter(p=>!idset.has(p.id));
      window._selMode=false;window._selIds=new Set();
      pushUndo('Hapus '+ids.length+' produk',async()=>{
        await insChunk('products',snap.map(prodRow));
        S.products=S.products.concat(snap);
      });
      rProd();toast(ids.length+' produk dihapus',true);
    }catch(e){toast(sbErr(e,'Gagal menghapus produk'));}
  });
}
function sbErr(e,fallback){
  const m=(e&&e.message)||'';
  if(m.includes('duplicate')&&m.includes('barcode'))return'Barcode ini sudah dipakai produk lain.';
  return m||fallback;
}

function readXlsxFile(f){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      let best=null,bestN=0;
      wb.SheetNames.forEach(n=>{
        if(/_hide|hasil|global|index/i.test(n))return;
        const aoa=XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:''});
        if(aoa.length>bestN){bestN=aoa.length;best=aoa;}
      });
      if(!best||best.length<2){res([]);return;}
      const hdr=best[0].map(x=>String(x==null?'':x).trim());
      const out=[];
      for(let i=1;i<best.length;i++){
        const cells=best[i].map(c=>String(c==null?'':c).trim());
        if(!cells.some(c=>c))continue;
        const low=cells.map(c=>c.toLowerCase());
        if(low.includes('wajib')||low.includes('opsional'))continue;
        const joined=low.join(' ');
        if(joined.includes('harap masukkan')||joined.includes('id numerik yang dihasilkan')||joined.includes('hanya angka positif'))continue;
        const o={};hdr.forEach((hd,x)=>{if(hd)o[hd]=cells[x]!==undefined?cells[x]:'';});
        out.push(o);
      }
      res(out);
    }catch(err){res([]);}
  };
  rd.onerror=()=>res([]);
  rd.readAsArrayBuffer(f);
});}
function readCsvFile(f){return new Promise(res=>{
  Papa.parse(f,{header:true,skipEmptyLines:true,
    complete:r=>res(r.data||[]),error:()=>res([])});
});}
async function parseCSV(inp){
  const files=[...(inp.files||[])];if(!files.length)return;
  toast('Membaca '+files.length+' file...');
  const perFile=[];let err=0;
  for(const f of files){
    const isX=/\.xlsx?$/i.test(f.name||'');
    const r=isX?await readXlsxFile(f):await readCsvFile(f);
    if(r.length)perFile.push({rows:r,hdr:Object.keys(r[0])});else err++;
  }
  if(!perFile.length){toast('File kosong atau format tidak terbaca');return;}
  let rows;
  const sig=f=>f.hdr.slice().sort().join('|');
  if(perFile.length>1&&!perFile.every(f=>sig(f)===sig(perFile[0]))){
    rows=mergeFiles(perFile);
  }else{
    rows=perFile.flatMap(f=>f.rows);
  }
  csvData=rows;
  if(err)toast(err+' file gagal dibaca, sisanya lanjut');
  const cols=[...new Set(rows.slice(0,80).flatMap(r=>Object.keys(r)))];
  mapCSV(cols);
}
function mergeFiles(perFile){
  const hasSku=h=>h.some(c=>/seller sku|sellersku/i.test(c));
  const hasHarga=h=>h.some(c=>/harga|price|stok|stock/i.test(c));
  let pi=perFile.findIndex(f=>hasSku(f.hdr)&&hasHarga(f.hdr));
  if(pi<0)pi=perFile.findIndex(f=>hasSku(f.hdr));
  if(pi<0)pi=0;
  const primary=perFile[pi];
  const join=primary.hdr.find(c=>/^product\s*id$/i.test(c));
  if(!join)return perFile.flatMap(f=>f.rows);
  const maps=perFile.filter((_,i)=>i!==pi).map(f=>{
    const m=new Map();
    f.rows.forEach(r=>{const v=String(r[join]||'').trim();if(v&&!m.has(v))m.set(v,r);});
    return m;
  });
  primary.rows.forEach(r=>{
    const v=String(r[join]||'').trim();if(!v)return;
    maps.forEach(m=>{
      const e=m.get(v);if(!e)return;
      for(const c in e){
        const val=String(e[c]==null?'':e[c]).trim();
        if(val&&(r[c]===undefined||String(r[c]).trim()===''))r[c]=e[c];
      }
    });
  });
  toast('File digabung otomatis lewat '+join);
  return primary.rows;
}

async function runImportMaster(){
  const g=id=>$(id).value;let n=0,u=0,fail=0;
  const createdIds=[],updatedSnaps=[];
  const btn=[...document.querySelectorAll('.modal .pill')].find(b=>b.textContent.includes('Import'));
  if(btn)busyOn(btn,'Mengimpor...');
  for(const row of csvData){
    const sku=g('mSku')?String(row[g('mSku')]||'').trim():'';
    const nama=g('mNama')?String(row[g('mNama')]||'').trim():'';
    if(!sku&&!nama)continue;
    const p=sku?S.products.find(x=>x.sku===sku):null;
    const autoBar=$('mAutoBar')?$('mAutoBar').checked:false;
    let bc=g('mBar')?String(row[g('mBar')]||'').trim():'';
    if(!bc&&autoBar)bc=genBarcode();
    let imgUrl=g('mImg')?String(row[g('mImg')]||'').trim():'';
    if(!/^https?:\/\//.test(imgUrl))imgUrl='';
    if(!imgUrl&&g('mImg')){
      for(const key of Object.keys(row)){
        if(!/gambar|foto|image|img/i.test(key))continue;
        const v=String(row[key]||'').trim();
        if(/^https?:\/\//.test(v)){imgUrl=v;break;}
      }
    }
    const o={sku:sku||('SKU'+Date.now().toString().slice(-6)+n),nama:nama||sku,
      jual:g('mJual')?num(row[g('mJual')]):0,beli:g('mBeli')?num(row[g('mBeli')]):0,
      stok:(function(){let v=g('mStok')?num(row[g('mStok')]):0;const cap=$('mCapMax')?Math.max(1,num($('mCapMax').value)||100):100;if($('mCapStok')&&$('mCapStok').checked&&v>cap)v=cap;return v;})(),barcode:bc,img:imgUrl||null,
      kategori:g('mKat')?String(row[g('mKat')]||'').trim():''};
    try{
      if(p){
        updatedSnaps.push({...p});
        const bcFinal=p.barcode||o.barcode||(autoBar?genBarcode():'');
        const imgFinal=p.img||o.img||null;
        const upd={nama:o.nama,jual:o.jual||p.jual,beli:o.beli||p.beli,stok:o.stok||p.stok,barcode:bcFinal,kategori:o.kategori||p.kategori,img:imgFinal};
        const{error}=await sb.from('products').update({nama:upd.nama,jual:upd.jual,beli:upd.beli,stok:upd.stok,barcode:upd.barcode,kategori:upd.kategori,img:upd.img}).eq('id',p.id);
        if(error)throw error;
        Object.assign(p,upd);u++;
      }else{
        const{data,error}=await sb.from('products').insert({toko_id:CU.toko_id,nama:o.nama,sku:o.sku,barcode:o.barcode,
          kategori:o.kategori,beli:o.beli,jual:o.jual,stok:o.stok,min_stok:0,img:o.img}).select().single();
        if(error)throw error;
        o.id=data.id;o.min=0;S.products.push(o);n++;createdIds.push(o.id);
      }
    }catch(e){fail++;}
  }
  if(n||u){
    const snapC=createdIds.slice(),snapU=updatedSnaps.slice();
    pushUndo('Import '+(n+u)+' produk',async()=>{
      if(snapC.length){
        await delChunk('products',snapC);
        const cs=new Set(snapC);
        S.products=S.products.filter(p=>!cs.has(p.id));
      }
      for(const s of snapU){
        const r=prodRow(s);delete r.id;delete r.toko_id;
        await sb.from('products').update(r).eq('id',s.id);
        const p=S.products.find(x=>x.id===s.id);if(p)Object.assign(p,s);
      }
    });
  }
  closeModal();rProd();toast(`Import selesai. ${n} baru, ${u} diperbarui${fail?', '+fail+' gagal':''}`,(n+u)>0);
}
function parseTgl(v){if(!v)return today();
  const d=new Date(v);if(!isNaN(d))return d.toISOString().slice(0,10);
  const m=String(v).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){let[,dd,mm,yy]=m;if(yy.length===2)yy='20'+yy;return`${yy}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;}
  return today();}
async function runImportSales(){
  const g=id=>$(id).value;const orders={};
  const btn=[...document.querySelectorAll('.modal .pill')].find(b=>b.textContent.includes('Import'));
  if(btn)busyOn(btn,'Mengimpor...');
  const adaNo=new Set(S.sales.map(s=>s.no));
  let skipBatal=0,skipDobel=0;
  csvData.forEach(row=>{
    if(g('jStatus')){
      const st=String(row[g('jStatus')]||'').toLowerCase();
      if(/cancel|batal|return|failed|refund/.test(st)){skipBatal++;return;}
    }
    const noCek=g('jNo')?String(row[g('jNo')]||'').trim():'';
    if(noCek&&adaNo.has(noCek)){skipDobel++;return;}
    const sku=g('jSku')?String(row[g('jSku')]||'').trim():'';
    const qty=g('jQty')?Math.max(1,num(row[g('jQty')])):1;
    const harga=g('jHarga')?num(row[g('jHarga')]):0;
    const tgl=parseTgl(g('jTgl')?row[g('jTgl')]:'');
    const no=g('jNo')?String(row[g('jNo')]||'').trim():('MP-'+tgl+'-'+Object.keys(orders).length);
    const p=S.products.find(x=>x.sku===sku);
    const nama=(g('jNama')?String(row[g('jNama')]||''):'')||p?.nama||sku||'Item';
    const hSat=qty>0?harga/qty:harga;
    const beli=p?p.beli:0;
    const plat='Online - '+($('jPlat')?$('jPlat').value:'Lazada');
    if(!orders[no])orders[no]={no,tgl,items:[],total:0,modal:0,profit:0,bayar:0,kembali:0,kasir:CU.nama,sumber:plat};
    orders[no].items.push({pid:p?.id||null,nama,qty,harga:hSat,beli});
    orders[no].total+=harga;orders[no].modal+=beli*qty;
    if(p)p.stok=Math.max(0,p.stok-qty);
  });
  let n=0,fail=0;const createdSales=[];
  for(const o of Object.values(orders)){
    o.profit=o.total-o.modal;o.bayar=o.total;
    try{
      const{data,error}=await sb.from('sales').insert({toko_id:CU.toko_id,no:o.no,tgl:o.tgl,kasir_id:CU.id,kasir_nama:CU.nama,
        items:o.items,total:o.total,modal:o.modal,profit:o.profit,bayar:o.bayar,kembali:0,sumber:o.sumber}).select().single();
      if(error)throw error;
      for(const it of o.items){if(it.pid){const p=S.products.find(x=>x.id===it.pid);
        if(p)await sb.from('products').update({stok:p.stok}).eq('id',p.id);}}
      o.id=data.id;S.sales.unshift(o);n++;createdSales.push(o);
    }catch(e){fail++;}
  }
  if(n){
    const snap=createdSales.map(s=>({...s,items:s.items.map(i=>({...i}))}));
    pushUndo('Import '+n+' pesanan marketplace',async()=>{
      await delChunk('sales',snap.map(s=>s.id));
      for(const s of snap)for(const it of s.items){
        const p=S.products.find(x=>x.id===it.pid);
        if(p)await setStokU(p,p.stok+it.qty);
      }
      const ids=new Set(snap.map(s=>s.id));
      S.sales=S.sales.filter(x=>!ids.has(x.id));
    });
  }
  closeModal();rJual();
  let pesan=`${n} pesanan tercatat`;
  if(skipDobel)pesan+=', '+skipDobel+' dilewati (sudah pernah diimport)';
  if(skipBatal)pesan+=', '+skipBatal+' baris batal dilewati';

async function checkout(){
  if(!CART.length){toast('Keranjang masih kosong');return;}
  const tot=CART.reduce((t,i)=>t+i.harga*i.qty,0);
  const bayar=num($('posBayar').value);
  if(bayar<tot){toast('Uang bayar kurang');return;}
  const modal=CART.reduce((t,i)=>t+i.beli*i.qty,0);
  const btn=[...document.querySelectorAll('.modal .pill')].find(b=>b.textContent.includes('Bayar'));
  if(btn)busyOn(btn,'Memproses...');
  const no='PK-'+Date.now().toString().slice(-8);
  const items=CART.map(i=>({...i}));
  try{
    const{data,error}=await sb.from('sales').insert({toko_id:CU.toko_id,no,tgl:window._posTgl||today(),
      kasir_id:CU.id,kasir_nama:CU.nama,items,total:tot,modal,profit:tot-modal,bayar,kembali:bayar-tot,sumber:($('posKanal')?$('posKanal').value:'Offline')}).select().single();
    if(error)throw error;
    for(const i of items){
      const p=S.products.find(x=>x.id===i.pid);if(!p)continue;
      const nstok=Math.max(0,p.stok-i.qty);
      const{error:e2}=await sb.from('products').update({stok:nstok}).eq('id',p.id);
      if(!e2)p.stok=nstok;
    }
    const sale={id:data.id,no,tgl:data.tgl,items,total:tot,modal,profit:tot-modal,bayar,kembali:bayar-tot,kasir:CU.nama,sumber:($('posKanal')?$('posKanal').value:'Offline')};
    S.sales.unshift(sale);CART=[];clearChecks();cartBar();
    pushUndo('Transaksi '+no,async()=>{
      const{error:e2}=await sb.from('sales').delete().eq('id',sale.id);
      if(e2)throw e2;
      for(const i of sale.items){const p=S.products.find(x=>x.id===i.pid);if(p)await setStokU(p,p.stok+i.qty);}
      S.sales=S.sales.filter(x=>x.id!==sale.id);
    });
    showStruk(sale);
  }catch(e){if(btn)busyOff(btn);toast(sbErr(e,'Gagal menyimpan transaksi'));}
}

function dashLine(g,y,W,pad){g.save();g.setLineDash([8,6]);g.beginPath();g.moveTo(pad,y);g.lineTo(W-pad,y);g.lineWidth=2;g.strokeStyle='#000';g.stroke();g.restore();}
function strukPNG(s){
  const st=S.set,W=600,pad=28,lh=30;
  const nItems=s.items.reduce((t,i)=>t+2+Math.ceil(String(i.nama).length/38),0);
  const big=document.createElement('canvas');
  big.width=W;big.height=700+nItems*lh+((st.alamat.length+st.footer.length+(st.header||'').length)/30)*26+200;
  const g=big.getContext('2d');
  if(!g)throw new Error('canvas');
  g.fillStyle='#fff';g.fillRect(0,0,big.width,big.height);
  g.fillStyle='#000';
  const fontB='bold 26px "Courier New",monospace',fontN='22px "Courier New",monospace',fontS='20px "Courier New",monospace';
  const wrap=(txt,font,maxw)=>{g.font=font;const out=[];let cur='';
    String(txt||'').split(' ').forEach(w=>{const t=cur?cur+' '+w:w;
      if(g.measureText(t).width>maxw&&cur){out.push(cur);cur=w;}else cur=t;});
    if(cur)out.push(cur);return out;};
  let y=46;
  if(LOGO_IMG&&LOGO_IMG.complete&&LOGO_IMG.naturalWidth){
    const maxH=110,maxW=W-2*pad;
    const sk=Math.min(maxH/LOGO_IMG.naturalHeight,maxW/LOGO_IMG.naturalWidth,1);
    const lw=LOGO_IMG.naturalWidth*sk,lhh=LOGO_IMG.naturalHeight*sk;
    g.drawImage(LOGO_IMG,(W-lw)/2,y-20,lw,lhh);
    y+=lhh+8;
  }else{
    g.save();g.translate(W/2,y);g.rotate(Math.PI/4);g.fillRect(-13,-13,26,26);g.restore();
    y+=44;
  }
  g.textAlign='center';
  g.font=fontB;g.fillText(String(st.toko).toUpperCase(),W/2,y);y+=30;
  g.font=fontS;
  wrap(st.alamat,fontS,W-2*pad).forEach(l=>{g.fillText(l,W/2,y);y+=26;});
  g.fillText('Telp '+st.telp,W/2,y);y+=26;
  if(st.header)wrap(st.header,fontS,W-2*pad).forEach(l=>{g.fillText(l,W/2,y);y+=26;});
  y+=8;dashLine(g,y,W,pad);y+=30;
  g.font=fontN;
  g.textAlign='left';g.fillText(s.no,pad,y);
  g.textAlign='right';g.fillText(s.tgl,W-pad,y);y+=lh;
  g.textAlign='left';g.fillText('Kasir',pad,y);
  g.textAlign='right';g.fillText(String(s.kasir),W-pad,y);y+=14;
  dashLine(g,y,W,pad);y+=32;
  s.items.forEach(i=>{
    g.textAlign='left';
    wrap(i.nama,fontN,W-2*pad).forEach(l=>{g.fillText(l,pad,y);y+=lh;});
    g.fillText(i.qty+' x '+fmt(i.harga),pad,y);
    g.textAlign='right';g.fillText(fmt(i.qty*i.harga),W-pad,y);y+=lh;
  });
  y+=4;dashLine(g,y,W,pad);y+=32;
  g.font=fontB;
  g.textAlign='left';g.fillText('TOTAL',pad,y);
  g.textAlign='right';g.fillText(fmt(s.total),W-pad,y);y+=lh+6;
  g.font=fontN;
  g.textAlign='left';g.fillText('Bayar',pad,y);
  g.textAlign='right';g.fillText(fmt(s.bayar),W-pad,y);y+=lh;
  g.textAlign='left';g.fillText('Kembali',pad,y);
  g.textAlign='right';g.fillText(fmt(s.kembali),W-pad,y);y+=16;
  dashLine(g,y,W,pad);y+=34;
  g.font=fontS;g.textAlign='center';
  wrap(st.footer,fontS,W-2*pad).forEach(l=>{g.fillText(l,W/2,y);y+=26;});
  y+=26;
  const c=document.createElement('canvas');c.width=W;c.height=Math.min(big.height,y+14);
  c.getContext('2d').drawImage(big,0,0);
  return c.toDataURL('image/png');
}

/* ============ SCANNER PREMIUM (BarcodeDetector + jsQR + Quagga) ============ */
var scanCb=null;
let scanCont=false,scanBusy=false,lastHit='',lastHitAt=0;
let liveStream=null,liveTimer=null,liveVideo=null,BD=null;
const READERS=['ean_reader','ean_8_reader','upc_reader','code_128_reader','code_39_reader'];
function beep(){try{
  const ax=new (window.AudioContext||window.webkitAudioContext)();
  const o=ax.createOscillator(),g=ax.createGain();
  o.connect(g);g.connect(ax.destination);
  o.frequency.value=1150;g.gain.value=.12;
  o.start();o.stop(ax.currentTime+.12);
  setTimeout(()=>{try{ax.close()}catch(e){}},300);
}catch(e){}}
function goodRead(r){
  const dc=(r.codeResult.decodedCodes||[]).filter(x=>x.error!==undefined);
  if(!dc.length)return true;
  return dc.reduce((t,x)=>t+x.error,0)/dc.length<0.17;
}
async function bdReady(){
  if(BD!==null)return !!BD;
  try{
    if(!('BarcodeDetector' in window)){BD=false;return false;}
    const sup=await window.BarcodeDetector.getSupportedFormats();
    const want=['ean_13','ean_8','upc_a','upc_e','code_128','code_39','code_93','itf','codabar','qr_code','data_matrix'].filter(f=>sup.includes(f));
    if(!want.length){BD=false;return false;}
    BD=new window.BarcodeDetector({formats:want});
    return true;
  }catch(e){BD=false;return false;}
}
function openScanner(cb,cont){scanCb=cb;scanCont=!!cont;lastHit='';lastHitAt=0;
  openModal(`<div class="grab"></div><h2>${cont?'Scan Kasir':'Scan Barcode'}</h2>
  <div id="video" style="margin-top:.5rem"></div>
  <p id="scanStat" style="font-size:.82rem;color:var(--gray2);margin-top:.55rem;text-align:center;font-weight:600">Menyalakan kamera...</p>
  ${cont?`<p style="font-size:.78rem;color:var(--gray);text-align:center;margin-top:.2rem">Scan barcode satu per satu, item otomatis masuk keranjang. Tekan Selesai jika sudah.</p>`:''}
  <div style="display:flex;gap:.5rem;margin-top:.6rem">
    <button class="pill sm out" style="flex:1" onclick="startLive()">↻ Ulang</button>
    <button class="pill sm blue" style="flex:1" onclick="$('scanFile').click()">${icS('cam')} Foto</button>
    <button class="pill sm" style="flex:1" onclick="$('scanFileGal').click()">${icS('box')} Galeri / SS</button>
  </div>
  <input type="file" id="scanFile" accept="image/*" capture="environment" class="hidden" onchange="scanFromFile(this)">
  <input type="file" id="scanFileGal" accept="image/*" class="hidden" onchange="scanFromFile(this)">
  <label>Atau ketik barcode manual</label>
  <div style="display:flex;gap:.4rem">
    <input id="scanManual" inputmode="numeric" placeholder="Ketik kode barcode" onkeydown="if(event.key==='Enter')scanManualGo()">
    <button class="pill sm" onclick="scanManualGo()">OK</button>
  </div>
  <div class="mFoot"><button class="pill sm out" onclick="stopScan();closeModal()">${cont?'Selesai':'Tutup'}</button></div>`,stopScan);
  setTimeout(startLive,200);
}
function scanStat(m){const s=$('scanStat');if(s)s.textContent=m;}
function scanFound(code){
  beep();
  if(scanCont){
    scanCb&&scanCb(code);
    scanStat('✓ '+code+' terbaca. Scan berikutnya...');
  }else{
    const cb=scanCb;stopScan();closeModal();cb&&cb(code);
  }
}
function dedupHit(code){
  const now=Date.now();
  if(scanCont&&code===lastHit&&now-lastHitAt<1500)return false;
  lastHit=code;lastHitAt=now;return true;
}
function camBlocked(msg){
  const box=$('video');if(box)box.style.display='none';
  scanStat(msg);
}
async function startLive(){
  stopScan();
  const box=$('video');if(!box)return;
  box.style.display='';box.innerHTML='';
  if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){
    camBlocked('Kamera live tidak didukung di jendela ini. Gunakan Foto, Galeri / SS, atau ketik manual.');return;}
  let stream=null;
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});}
  catch(e){
    const nm=e&&e.name;
    camBlocked(nm==='NotAllowedError'||nm==='SecurityError'
      ?'Kamera diblokir di jendela pratinjau atau izinnya ditolak. Unduh file lalu buka langsung di Chrome dan izinkan kamera. Sementara itu gunakan Foto, Galeri / SS, atau ketik manual.'
      :'Kamera tidak ditemukan atau sedang dipakai aplikasi lain. Gunakan Foto, Galeri / SS, atau ketik manual.');
    return;}
  if(await bdReady()){
    liveStream=stream;
    box.innerHTML='<video autoplay playsinline muted style="width:100%;border-radius:16px;display:block"></video>';
    liveVideo=box.querySelector('video');liveVideo.srcObject=liveStream;
    scanStat('Arahkan kamera ke barcode.');
    bdLoop();return;
  }
  try{stream.getTracks().forEach(t=>t.stop());}catch(e){}
  if(typeof Quagga==='undefined'){camBlocked('Scanner belum termuat. Gunakan Foto, Galeri / SS, atau ketik manual.');return;}
  Quagga.init({inputStream:{type:'LiveStream',target:box,constraints:{facingMode:'environment'}},
    decoder:{readers:READERS},locate:true},
    err=>{
      if(err){scanStat('Akses kamera ditolak. Izinkan kamera di browser, atau gunakan Foto / Galeri / manual.');return;}
      Quagga.start();scanStat('Arahkan kamera ke barcode.');
    });
  let last='',cnt=0;
  Quagga.offDetected();
  Quagga.onDetected(r=>{
    const code=r?.codeResult?.code;if(!code||!goodRead(r))return;
    if(code===last)cnt++;else{last=code;cnt=1;}
    if(cnt>=2){last='';cnt=0;if(dedupHit(code))scanFound(code);}
  });
}
function bdLoop(){
  liveTimer=setTimeout(async()=>{
    if(!liveVideo||!liveStream)return;
    try{
      if(liveVideo.readyState>=2&&BD){
        const codes=await BD.detect(liveVideo);
        if(codes&&codes.length){
          const code=codes[0].rawValue;
          if(code&&dedupHit(code)){scanFound(code);if(!scanCont)return;}
        }
      }
    }catch(e){}
    if(liveStream)bdLoop();
  },170);
}
/* --- foto, galeri, screenshot penuh --- */
function scanFromFile(inp){
  const f=inp.files&&inp.files[0];inp.value='';
  if(!f)return;
  if(scanBusy)return;scanBusy=true;
  scanStat('Membaca gambar...');
  const rd=new FileReader();
  rd.onload=e=>{
    const img=new Image();
    img.onload=()=>decodePhoto(img,null);
    img.onerror=()=>bitmapFallback(f);
    img.src=e.target.result;
  };
  rd.onerror=()=>bitmapFallback(f);
  rd.readAsDataURL(f);
}
async function bitmapFallback(f){
  try{
    const bmp=await createImageBitmap(f);
    decodePhoto(bmp,null);
  }catch(e){scanBusy=false;scanStat('Gambar tidak terbaca. Gunakan format JPG atau PNG.');}
}
function drawImg(img,w,rot,enh){
  const sc=Math.min(1.8,w/img.width);
  const iw=Math.max(1,Math.round(img.width*sc)),ih=Math.max(1,Math.round(img.height*sc));
  const c=document.createElement('canvas');
  if(rot===90){c.width=ih;c.height=iw;}else{c.width=iw;c.height=ih;}
  const x=c.getContext('2d');
  x.imageSmoothingEnabled=true;x.imageSmoothingQuality='high';
  if(rot===90){x.translate(ih/2,iw/2);x.rotate(Math.PI/2);x.drawImage(img,-iw/2,-ih/2,iw,ih);}
  else x.drawImage(img,0,0,iw,ih);
  if(enh){
    const d=x.getImageData(0,0,c.width,c.height),a=d.data;
    for(let i=0;i<a.length;i+=4){
      let g=.299*a[i]+.587*a[i+1]+.114*a[i+2];
      g=(g-128)*1.7+128;g=g<0?0:g>255?255:g;
      a[i]=a[i+1]=a[i+2]=g;
    }
    x.putImageData(d,0,0);
  }
  return c;
}
function qDecode(src,patch,half){return new Promise(res=>{
  try{
    Quagga.decodeSingle({src,numOfWorkers:0,locate:true,
      inputStream:{size:2000},
      locator:{patchSize:patch,halfSample:half},
      decoder:{readers:READERS}},
      r=>{res(r&&r.codeResult&&r.codeResult.code&&goodRead(r)?r.codeResult.code:null);});
  }catch(e){res(null);}
});}
async function decodePhoto(img,url){
  const finish=code=>{scanBusy=false;if(url){try{URL.revokeObjectURL(url)}catch(e){}}
    if(code)scanFound(code);
    else scanStat('Barcode tidak terbaca. Coba foto ulang lebih dekat, terang, dan tajam.');};
  /* Lapis 1: BarcodeDetector native. Membaca screenshot penuh, otomatis menemukan posisi barcode. */
  if(await bdReady()){
    for(const v of [[1600,0,false],[1600,0,true],[2400,0,false],[1600,90,false]]){
      scanStat('Menganalisa gambar (deteksi cerdas)...');
      try{
        const codes=await BD.detect(drawImg(img,v[0],v[1],v[2]));
        if(codes&&codes.length&&codes[0].rawValue)return finish(codes[0].rawValue);
      }catch(e){}
    }
  }
  /* Lapis 2: jsQR untuk kode QR dari screenshot */
  if(typeof jsQR!=='undefined'){
    scanStat('Mencari kode QR...');
    try{
      const c=drawImg(img,1024,0,false);
      const d=c.getContext('2d').getImageData(0,0,c.width,c.height);
      const q=jsQR(d.data,c.width,c.height);
      if(q&&q.data)return finish(q.data);
    }catch(e){}
  }
  /* Lapis 3: Quagga multi varian */
  if(typeof Quagga!=='undefined'){
    const variants=[[1400,0,false],[1400,0,true],[1400,90,false],[1400,90,true],[2000,0,true],[2000,90,true]];
    const cfgs=[['medium',true],['large',false]];
    let step=0,total=variants.length*cfgs.length;
    for(const v of variants){
      const src=drawImg(img,v[0],v[1],v[2]).toDataURL('image/jpeg',.92);
      for(const c of cfgs){
        step++;scanStat('Menganalisa gambar '+step+'/'+total+'...');
        const code=await qDecode(src,c[0],c[1]);
        if(code)return finish(code);
      }
    }
  }
  finish(null);
}

async function addMasuk(){
  const pid=$('miProd').value;const p=S.products.find(x=>x.id===pid);
  if(!p){toast('Pilih produk dulu');return;}
  const q=Math.max(1,num($('miQty').value));
  const nb=num($('miBeli').value);
  const nstok=p.stok+q;
  try{
    const upd={stok:nstok};if(nb>0)upd.beli=nb;
    const{error}=await sb.from('products').update(upd).eq('id',p.id);
    if(error)throw error;
    const{data,error:e2}=await sb.from('stock_in').insert({toko_id:CU.toko_id,tgl:$('miTgl').value||today(),
      product_id:pid,qty:q,ket:$('miKet').value.trim()}).select().single();
    if(e2)throw e2;
    const beliLama=p.beli,stokLama=p.stok;
    p.stok=nstok;if(nb>0)p.beli=nb;
    const rec={id:data.id,tgl:data.tgl,pid,qty:q,ket:data.ket||''};
    S.masuk.unshift(rec);
    pushUndo('Barang masuk '+p.nama+' +'+q,async()=>{
      const{error:e3}=await sb.from('stock_in').delete().eq('id',rec.id);
      if(e3)throw e3;
      const{error:e4}=await sb.from('products').update({stok:stokLama,beli:beliLama}).eq('id',p.id);
      if(e4)throw e4;
      p.stok=stokLama;p.beli=beliLama;
      S.masuk=S.masuk.filter(x=>x.id!==rec.id);
    });
    rMasuk();toast('Stok bertambah +'+q,true);
  }catch(e){toast(sbErr(e,'Gagal menyimpan barang masuk'));}
}

function ymLabel(ym){const[y,m]=ym.split('-');return BLN[+m-1]+' '+y;}
function ymShift(ym,d){const[y,m]=ym.split('-').map(Number);const dt=new Date(y,m-1+d,1);

function kanal(s){
  const v=s.sumber||'';
  if(v==='Toko')return'Offline';
  if(v==='Marketplace')return'Online';

}
function isOnline(s){return kanal(s).startsWith('Online');}
function efBeli(it){if(it.beli>0)return it.beli;const p=S.products.find(x=>x.id===it.pid);return p&&p.beli>0?p.beli:0;}
function monthStats(ym){
  const list=S.sales.filter(s=>(s.tgl||'').slice(0,7)===ym).slice().reverse();
  let omset=0,laba=0,kurang=new Set();
  list.forEach(s=>s.items.forEach(it=>{

  const ops=S.kas.filter(k=>k.tipe==='Operasional'&&(k.tgl||'').slice(0,7)===ym).reduce((t,k)=>t+k.jumlah,0);
  return{list,omset,laba,kurang:[...kurang],ops,bersih:laba-ops};
}

function exportRekapCSV(){
  const ym=window._jm||today().slice(0,7);
  const{list,omset,laba,ops,bersih}=monthStats(ym);
  if(!list.length){toast('Tidak ada data di bulan ini');return;}
  const modal=omset-laba;
  const R=[];
  const kosong=[];
  const merges=[];
  const judul=(txt)=>{merges.push({s:{r:R.length,c:0},e:{r:R.length,c:10}});R.push([txt]);};
  judul('LAPORAN PENJUALAN');
  judul(S.set.toko||'Toko');
  R.push(['Periode',ymLabel(ym)]);
  R.push(['Dicetak',new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})]);
  R.push(kosong);
  judul('RINGKASAN');
  R.push(['Omset Penjualan',omset]);
  R.push(['Modal (HPP)',modal]);
  R.push(['Laba Kotor',laba]);
  R.push(['Biaya Operasional',ops]);
  R.push(['Laba Bersih',bersih]);
  R.push(['Omset Offline',list.filter(s=>!isOnline(s)).reduce((t,s)=>t+s.total,0)]);
  R.push(['Omset Online',list.filter(isOnline).reduce((t,s)=>t+s.total,0)]);
  R.push(['Jumlah Transaksi',list.length]);
  R.push(kosong);
  judul('DETAIL TRANSAKSI');
  R.push(['Tanggal','No Transaksi','Sumber','Kasir','Produk','Qty','Harga Jual','Harga Beli','Omset','Modal','Laba']);
  const startDetail=R.length;
  list.slice().reverse().forEach(s=>s.items.forEach(it=>{
    const b=efBeli(it),om=it.harga*it.qty,mo=b*it.qty;
    R.push([s.tgl,s.no,kanal(s),s.kasir,it.nama,it.qty,it.harga,b,om,mo,om-mo]);
  }));
  const endDetail=R.length-1;
  R.push(['','','','','','','','','TOTAL',modal,laba]);

  const ws=XLSX.utils.aoa_to_sheet(R);
  ws['!cols']=[{wch:12},{wch:16},{wch:13},{wch:14},{wch:34},{wch:6},{wch:13},{wch:13},{wch:13},{wch:13},{wch:13}];
  ws['!merges']=merges;
  // format angka rupiah pada kolom ringkasan & detail
  const numFmt='#,##0';
  [7,8,9,10,11].forEach(r=>{const c=ws[XLSX.utils.encode_cell({r,c:1})];if(c)c.z=numFmt;});
  for(let r=startDetail;r<=endDetail;r++){
    [6,7,8,9,10].forEach(c=>{const cell=ws[XLSX.utils.encode_cell({r,c})];if(cell)cell.z=numFmt;});
  }
  const totRow=endDetail+1;
  [9,10].forEach(c=>{const cell=ws[XLSX.utils.encode_cell({r:totRow,c})];if(cell)cell.z=numFmt;});

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Laporan');
  const bin=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  const bl=new Blob([bin],{type:'application/octet-stream'});
  const el=document.createElement('a');el.href=URL.createObjectURL(bl);
  el.download='Laporan Penjualan - '+ymLabel(ym)+'.xlsx';el.click();
  toast('Laporan '+ymLabel(ym)+' terunduh (Excel)');
}

function delSale(id){askConfirm('Hapus transaksi ini? Stok akan dikembalikan.',async()=>{
  const s=S.sales.find(x=>x.id===id);if(!s)return;
  const snap={...s,items:s.items.map(i=>({...i}))};
  try{
    const{error}=await sb.from('sales').delete().eq('id',id);
    if(error)throw error;
    for(const i of s.items){
      const p=S.products.find(x=>x.id===i.pid);if(!p)continue;
      await setStokU(p,p.stok+i.qty);
    }
    S.sales=S.sales.filter(x=>x.id!==id);
    pushUndo('Hapus transaksi '+snap.no,async()=>{
      const{error:e2}=await sb.from('sales').insert(saleRow(snap));
      if(e2)throw e2;
      for(const i of snap.items){const p=S.products.find(x=>x.id===i.pid);if(p)await setStokU(p,Math.max(0,p.stok-i.qty));}
      S.sales.unshift(snap);
    });
    rJual();toast('Transaksi dihapus',true);
  }catch(e){toast(sbErr(e,'Gagal menghapus transaksi'));}

async function saveOps(){
  const j=num($('opJml').value),ket=$('opKet').value.trim();
  if(!ket){toast('Nama biaya wajib diisi');return;}
  if(j<=0){toast('Jumlah harus lebih dari 0');return;}
  try{
    const{data,error}=await sb.from('kas').insert({toko_id:CU.toko_id,tipe:'Operasional',jumlah:j,
      tgl:$('opTgl').value||today(),ket}).select().single();
    if(error)throw error;
    const rec={id:data.id,tipe:'Operasional',jumlah:j,tgl:data.tgl,ket};
    S.kas.unshift(rec);
    pushUndo('Biaya operasional '+ket,async()=>{
      const{error:e2}=await sb.from('kas').delete().eq('id',rec.id);
      if(e2)throw e2;
      S.kas=S.kas.filter(x=>x.id!==rec.id);
    });

async function saveKas(){
  const j=num($('ksJml').value);if(j<=0){toast('Jumlah harus lebih dari 0');return;}
  try{
    const{data,error}=await sb.from('kas').insert({toko_id:CU.toko_id,tipe:$('ksTipe').value,jumlah:j,

function delKas(id){askConfirm('Hapus catatan kas ini?',async()=>{
  const snap={...S.kas.find(k=>k.id===id)};

    if(error)throw error;
    S.kas=S.kas.filter(k=>k.id!==id);
    pushUndo('Hapus kas '+snap.tipe+' '+fmt(snap.jumlah),async()=>{
      const{error:e2}=await sb.from('kas').insert({id:snap.id,toko_id:CU.toko_id,tipe:snap.tipe,jumlah:snap.jumlah,tgl:snap.tgl,ket:snap.ket||''});

});}

async function saveUser(id){
  const nama=$('usNama').value.trim(),jab=$('usJab').value;
  if(!nama){toast('Nama wajib diisi');return;}
  const lama=KARY_LIST.find(x=>x.id===id);
  const snap=lama?{nama:lama.nama,jabatan:lama.jabatan}:null;
  try{
    const{error}=await sb.from('profiles').update({nama,jabatan:jab}).eq('id',id);
    if(error)throw error;
    if(snap)pushUndo('Ubah karyawan '+snap.nama,async()=>{
      const{error:e2}=await sb.from('profiles').update(snap).eq('id',id);
      if(e2)throw e2;
    });
    closeModal();rKary();toast('Karyawan tersimpan',true);
  }catch(e){toast(sbErr(e,'Gagal menyimpan karyawan'));}
}
function delUser(id){askConfirm('Hapus karyawan ini dari toko? Akun loginnya tetap ada tapi tidak lagi tergabung.',async()=>{
  try{
    const{error}=await sb.from('profiles').delete().eq('id',id);
    if(error)throw error;

});}

/* ============ MODAL ============ */
let modalCleanup=null;
function openModal(html,cleanup){modalCleanup=cleanup||null;
  $('modalHost').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){if(modalCleanup){try{modalCleanup();}catch(e){}modalCleanup=null;}$('modalHost').innerHTML='';}
function askConfirm(msg,yes){
  const h=document.createElement('div');h.className='overlay';h.style.zIndex='90';
  h.innerHTML=`<div class="modal" style="max-width:340px;text-align:center">
    <h2 style="margin-bottom:.35rem">Konfirmasi</h2>
    <p style="font-size:.9rem;color:var(--gray2)">${msg}</p>
    <div class="mFoot" style="justify-content:center">
      <button class="pill sm out">Batal</button>
      <button class="pill sm red">Ya, Lanjut</button>
    </div></div>`;
  const bs=h.querySelectorAll('button');
  bs[0].onclick=()=>h.remove();
  bs[1].onclick=()=>{h.remove();yes();};
  h.onclick=e=>{if(e.target===h)h.remove();};
  document.body.appendChild(h);
}
function dataURLtoBlob(u){
  const p=u.split(',');const bin=atob(p[1]);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:(p[0].match(/data:([^;]+)/)||[])[1]||'image/png'});
}
function tryDownload(url,name){
  try{
    let href=url;
    if(url.startsWith('data:')){
      href=URL.createObjectURL(dataURLtoBlob(url));
      setTimeout(()=>{try{URL.revokeObjectURL(href);}catch(e){}},60000);
    }
    const a=document.createElement('a');
    a.href=href;a.download=name;a.rel='noopener';
    document.body.appendChild(a);a.click();a.remove();
    toast('Unduhan dimulai. Jika tidak muncul, tekan lama gambarnya.');
    return true;
  }catch(e){toast('Unduhan diblokir. Tekan lama gambar untuk menyimpan.');return false;}
}
function showImgResult(url,name){
  window._lastImg={url,name};
  openModal(`<div class="grab"></div><h2>Gambar Siap Disimpan</h2>
  <img src="${url}" style="width:100%;max-height:46vh;object-fit:contain;border:1px solid var(--line);border-radius:14px;background:#fff;margin-top:.4rem">
  <p style="font-size:.82rem;color:var(--gray2);margin-top:.6rem">Cara simpan ke galeri: tekan lama gambar di atas (HP) atau klik kanan (desktop), lalu pilih Simpan Gambar. Atau tekan tombol Unduh.</p>
  <div class="mFoot"><button class="pill sm out" onclick="closeModal()">Tutup</button>
  <button class="pill sm blue" onclick="tryDownload(window._lastImg.url,window._lastImg.name)">Unduh</button></div>`);
}
